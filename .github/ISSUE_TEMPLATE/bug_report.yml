name: Bug report
description: SVS Label Renamer for macOSの不具合を報告します
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **患者情報を含むSVS・ラベル画像・CSVは添付しないでください。**
  - type: input
    id: macos
    attributes:
      label: macOSバージョン
      placeholder: 例：macOS 15.5
    validations:
      required: true
  - type: dropdown
    id: cpu
    attributes:
      label: Macの種類
      options:
        - Apple Silicon（M1以降）
        - Intel
        - 不明
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 発生した問題
      description: 個人情報を除いて、操作と表示されたエラーを記載してください。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待した動作
    validations:
      required: true
