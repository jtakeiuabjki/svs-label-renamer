name: Build macOS app

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Test
        run: swift test
      - name: Build standalone app
        run: bash scripts/build_app.sh
      - name: Upload ad-hoc signed development build
        uses: actions/upload-artifact@v7
        with:
          name: SVSLabelRenamer-macOS
          path: dist/SVSLabelRenamer-macOS.zip
